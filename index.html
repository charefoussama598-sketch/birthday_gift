<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>A Special Gift for Israa</title>
    <style>
        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
        
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background: radial-gradient(circle, #f8f9fa 0%, #e9ecef 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            color: #495057;
        }

        #giftContainer {
            position: relative;
            cursor: pointer;
            width: 150px;
            height: 150px;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }

        .gift-box {
            width: 100%;
            height: 100%;
            background: #ffc9c9;
            border-radius: 12px;
            position: relative;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            transition: transform 0.3s ease;
        }

        /* شريط الهدية الأحمر */
        .gift-box::after {
            content: '';
            position: absolute;
            width: 25px;
            height: 100%;
            background: #e03131;
            left: 50%;
            transform: translateX(-50%);
        }

        .lid {
            width: 160px;
            height: 35px;
            background: #ff8787;
            position: absolute;
            top: -20px;
            left: -5px;
            z-index: 11;
            border-radius: 5px;
            transition: all 0.6s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            box-shadow: 0 5px 10px rgba(0,0,0,0.05);
        }

        /* الكارط اللي تخرج لـ إسراء */
        .card {
            position: absolute;
            top: 10px;
            left: 50%;
            transform: translate(-50%, 0);
            width: 280px;
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 15px 45px rgba(0,0,0,0.1);
            text-align: center;
            opacity: 0;
            visibility: hidden;
            transition: all 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            color: #495057;
            z-index: 1;
        }

        .card h2 { color: #e03131; margin-top: 0; font-size: 24px; }
        .card p { font-size: 16px; line-height: 1.6; margin-bottom: 5px; }

        /* حركة الفتح */
        .open .lid { transform: translateY(-170px) rotate(-15deg); opacity: 0; }
        .open .card { opacity: 1; visibility: visible; transform: translate(-50%, -230px); }
        .open .gift-box { transform: scale(0.9); background: #ffe3e3; }

        .hint {
            position: absolute;
            bottom: -60px;
            width: 100%;
            text-align: center;
            color: #e03131;
            font-weight: bold;
            font-size: 15px;
        }
    </style>
</head>
<body>

<div id="giftContainer">
    <div class="card">
        <h2>Happy Birthday, Israa! 🌸</h2>
        <p>Wishing you a day filled with love and laughter. You deserve the best! ✨</p>
        <p style="font-size: 14px; color: #ff8787;">Enjoy your special day! 💖</p>
    </div>
    <div class="lid"></div>
    <div class="gift-box"></div>
    <div class="hint">Tap to open! 🎁</div>
</div>

<script>
    const gift = document.getElementById('giftContainer');
    function toggleGift(e) {
        if (e.cancelable) e.preventDefault();
        gift.classList.toggle('open');
    }
    gift.addEventListener('touchstart', toggleGift, {passive: false});
    gift.addEventListener('click', toggleGift);
</script>

</body>
</html>
